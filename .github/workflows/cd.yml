name: CD

on:
  push:
    branches:
      - feature/**

jobs:
  publish-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SchoolGradesMvcSite/SchoolGradesMvcSite.csproj

      - name: Publish
        run: dotnet publish SchoolGradesMvcSite/SchoolGradesMvcSite.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: schoolgrades-published-site
          path: ./publish
